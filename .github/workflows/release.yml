# Tag push (vX.Y.Z) 시 자동으로 build → zip → SHA256 → GitHub Release 생성.
# 로컬 create-release.sh의 [1/5]~[4/5] 단계를 대체한다.
#
# workflow_dispatch로도 수동 실행 가능 (secret/workflow 자체를 빠르게 검증할 때).
# dry-run=true면 build/zip/sha만 수행하고 release 생성/asset 업로드는 건너뛴다.
#
# 필요한 secrets (Settings → Secrets and variables → Actions):
#   SIGNING_CERT_P12_BASE64   ./export-signing-cert.sh로 추출한 base64 cert
#   SIGNING_CERT_PASSWORD     export 시 입력한 .p12 password
# secrets 미등록 시 cert import가 실패하므로 build는 ad-hoc 서명으로 fallback된다.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the dry-run zip (e.g. v0.3.0-dry)'
        required: true
        default: 'v0.0.0-dry'
      dry_run:
        description: 'Skip release creation/upload — build/zip/sha만 검증'
        required: true
        default: true
        type: boolean

jobs:
  release:
    # 'macos-latest' (=26)는 2026.04 이후 manual codesigning issue가 있어 안정 LTS로 핀.
    # actions/runner-images#13884 참고.
    runs-on: macos-14
    permissions:
      contents: write   # release create / asset upload

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version label
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.SIGNING_CERT_P12_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.SIGNING_CERT_PASSWORD }}

      - name: Build app bundle
        env:
          SIGNING_IDENTITY: RightClickOnUpDev
        run: ./build.sh

      - name: Package zip + SHA256
        id: package
        run: |
          VERSION="${{ steps.ver.outputs.value }}"
          ZIP="gesture-ex-${VERSION}.zip"
          ditto -c -k --keepParent gesture-ex.app "$ZIP"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          SIZE=$(du -h "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"
          {
            echo "## Build summary"
            echo "- version: \`$VERSION\`"
            echo "- zip: \`$ZIP\` ($SIZE)"
            echo "- sha256: \`$SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact (always — useful in dry-run too)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.zip }}
          path: ${{ steps.package.outputs.zip }}
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
          body: |
            **Asset**: `${{ steps.package.outputs.zip }}` (${{ steps.package.outputs.size }})
            **SHA256**: `${{ steps.package.outputs.sha256 }}`

            ### Cask metadata
            ```
            version:  ${{ steps.package.outputs.version_no_v }}
            url:      https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.package.outputs.zip }}
            sha256:   ${{ steps.package.outputs.sha256 }}
            ```

            ---
